version: "3.8"
services:
  seguridad:
    build:
      context: ./mssuaweb-seguridad
      dockerfile: Dockerfile
    ports:
      - "4109:4109"
    container_name: mssuaweb-seguridad

  catalogos:
    build:
      context: ./mssuaweb-catalogos
      dockerfile: Dockerfile
    ports:
      - "4110:4110"
    container_name: mssuaweb-catalogos

  contadores:
    build:
      context: ./mssuaweb-contadores
      dockerfile: Dockerfile
    ports:
      - "4111:4111"
    container_name: mssuaweb-contadores
    environment:  
      - SUAWEB_DOCUMENTOS_URL=http://documentos:4113/mssuaweb-documentos/v1/cargarDocumento  
    depends_on:  
      - documentos  

  acuses:
    build:
      context: ./mssuaweb-acuses
      dockerfile: Dockerfile
    ports:
      - "4112:4112"
    container_name: mssuaweb-acuses

  documentos:
    build:
      context: ./mssuaweb-documentos
      dockerfile: Dockerfile
    ports:
      - "4113:4113"
    container_name: mssuaweb-documentos
      
